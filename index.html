<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LEMI — propuestas web</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Alfa+Slab+One&family=Permanent+Marker&family=Archivo:wght@500;700&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100dvh;
    background: #f1ead9;
    color: #26251f;
    font-family: "Archivo", sans-serif;
    display: grid;
    place-items: center;
    padding: 2rem 1rem;
  }
  .caja { text-align: center; max-width: 560px; width: 100%; }
  h1 {
    font-family: "Alfa Slab One", serif;
    font-size: clamp(3.5rem, 14vw, 6rem);
    color: #6a7a3f;
    text-shadow: 3px 4px 0 #26251f;
    line-height: 0.9;
  }
  .sub {
    font-family: "Permanent Marker", cursive;
    font-size: 1.3rem;
    color: #d96e30;
    margin: 1rem 0 2.5rem;
    transform: rotate(-2deg);
  }
  .lista { display: grid; gap: 1.1rem; }
  a.propuesta {
    display: block;
    text-decoration: none;
    background: #fffdf6;
    color: #26251f;
    border: 3px solid #26251f;
    box-shadow: 5px 6px 0 rgba(38,37,31,0.85);
    padding: 1.3rem 1.5rem;
    font-weight: 700;
    font-size: 1.15rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: transform 150ms ease-out, box-shadow 150ms ease-out;
  }
  a.propuesta small {
    display: block;
    font-family: "Permanent Marker", cursive;
    font-weight: 400;
    text-transform: none;
    letter-spacing: 0;
    font-size: 0.95rem;
    color: #6a7a3f;
    margin-top: 0.3rem;
  }
  a.propuesta:nth-child(1) { transform: rotate(-1.2deg); }
  a.propuesta:nth-child(2) { transform: rotate(1deg); }
  a.propuesta:nth-child(3) { transform: rotate(-0.8deg); }
  a.propuesta:hover { transform: rotate(0deg) translateY(-3px); box-shadow: 7px 8px 0 rgba(38,37,31,0.85); }
  a.propuesta:active { transform: scale(0.98); box-shadow: 2px 2px 0 rgba(38,37,31,0.85); }
  .pendiente { opacity: 0.45; pointer-events: none; }
</style>
</head>
<body>
  <main class="caja">
    <h1>LEMI</h1>
    <p class="sub">propuestas de página web ↓</p>
    <nav class="lista">
      <a class="propuesta" href="propuesta-1/">Propuesta 1<small>muro de pósters, como el Instagram</small></a>
      <a class="propuesta pendiente" href="propuesta-2/">Propuesta 2<small>próximamente</small></a>
      <a class="propuesta pendiente" href="propuesta-3/">Propuesta 3<small>próximamente</small></a>
    </nav>
  </main>
</body>
</html>
